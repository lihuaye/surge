[Rule]
# ========== 1. 特殊处理规则 ==========
# > 局域网规则（最高优先级）
RULE-SET,LAN,DIRECT

# 国内域名指定的阿里 DoH 直连
IP-CIDR,223.5.5.5/32,DIRECT,no-resolve

# > Surge 自身的加密 DNS 固定通过自建美国洛杉矶节点
PROTOCOL,DOH,DNS-Proxy
PROTOCOL,DOH3,DNS-Proxy
PROTOCOL,DOQ,DNS-Proxy

# > 拦截第三方应用自带的加密 DNS（DoH/DoT/DoQ），迫使其回落到被 Surge 接管的系统 DNS
