[URL Rewrite]
# ⚠️ 针对 https 的规则仅对 [MITM] hostname 列表内、且设备已安装信任证书的域名生效
# ========== Google 服务重定向 ==========
# > Google 搜索服务重定向
^https?:\/\/(www.)?(g|google)\.cn https://www.google.com 302
# > Google 地图服务重定向
^https?:\/\/(ditu|maps).google\.cn https://maps.google.com 302

# ========== HTTPS 重定向 ==========
# > 电商平台 HTTPS 重定向
^https?:\/\/(www.)?taobao\.com\/ https://taobao.com/ 302
^https?:\/\/(www.)?jd\.com\/ https://www.jd.com/ 302
^https?:\/\/(www.)?suning\.com\/ https://suning.com/ 302
^https?:\/\/(www.)?yhd\.com\/ https://yhd.com/ 302
^https?:\/\/(www.)?pinduoduo\.com\/ https://pinduoduo.com/ 302

# > 其他网站 HTTPS 重定向
^https?:\/\/(www.)?mi\.com\/ https://www.mi.com/ 302
^https?:\/\/you\.163\.com\/ https://you.163.com/ 302

# ========== 流媒体相关 ==========
# > AbemaTV IP 检测屏蔽
^https?:\/\/api\.abema\.io\/v\d\/ip\/check - reject

# ========== 2026 年新增重写规则 ==========
# > 阻止不必要的更新检查 header
^https?:\/\/.*\.update\.microsoft\.com\/.* - reject
^https?:\/\/.*\.windowsupdate\.com\/.* - reject

# ========== 自定义重写规则 ==========
# > CUSTOM URL header
^https?://(www\.)?fedex\.com/(?!en-us/)(.*)$ https://www.fedex.com/en-us/$2 302

[Header Rewrite]
# ⚠️ 本段规则需 [MITM] hostname 覆盖对应域名、且设备已安装信任证书后才对 https 生效
# ========== 知乎相关 ==========
# > 知乎客户端伪装
http-request ^https?:\/\/.*\.zhihu\.com\/(question|topic) header-replace User-Agent "osee2unifiedRelease/4432 osee2unifiedReleaseVersion/7.8.0 Mozilla/5.0 (iPhone; CPU iPhone OS 18_0 like Mac OS X) AppleWebKit/605.1.15 (KHTML, like Gecko) Mobile/15E148"

# ========== GitHub 相关 ==========
# > 解决 GitHub 速率限制返回 429 问题
http-request ^https:\/\/github\.com\/ header-replace Accept-Language en-us
http-request ^https:\/\/(raw|gist)\.githubusercontent\.com\/ header-replace Accept-Language en-us

# ========== 2026 年新增 Header 重写 ==========
# > AI 服务优化
http-request ^https:\/\/.*\.openai\.com\/.* header-add X-Forwarded-For 8.8.8.8
http-request ^https:\/\/.*\.anthropic\.com\/.* header-add X-Forwarded-For 8.8.8.8

[MITM]
# ⚠️ 需在 Surge 中生成 CA 证书并在 iPhone/Mac 上安装、完全信任后，https 解密才生效
# > 跳过上游服务器证书校验：有被伪造站点的风险，如无特殊需要建议改为 false
skip-server-cert-verify = true
# > 对原始 TCP 连接启用 MITM
tcp-connection = true
# > 支持 HTTP/2
h2 = true
# ========== MITM 域名列表 ==========
hostname = www.google.cn, api.abema.io, *.zhihu.com, sub.store, github.com, raw.githubusercontent.com, gist.githubusercontent.com, *.openai.com, *.anthropic.com
# > AI 域名暂时停用解密（保留在列表中，需要时在 Surge 里开启）
hostname-disabled = *.openai.com, *.anthropic.com
# ========== 证书配置 ==========
# > 证书配置留空（公开模板）：在 Surge「MitM → 生成新的 CA 证书」后由 Surge 写入本地配置；双端共用同一份 p12
# > ⚠️ 真实 ca-passphrase / ca-p12（CA 私钥）绝不要提交回公开仓库
# ca-passphrase =
# ca-p12 =
