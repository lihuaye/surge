RULE-SET,https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/XiaoHongShu/XiaoHongShu.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/zxfccmm4/Profiles/main/Surge/Ruleset/China.list,DIRECT
RULE-SET,https://raw.githubusercontent.com/VirgilClyne/GetSomeFries/main/ruleset/ASN.China.list,DIRECT

# > 软件更新、操作系统等大文件下载
DOMAIN-SET,https://ruleset.skk.moe/List/domainset/download.conf,Mainland
RULE-SET,https://ruleset.skk.moe/List/non_ip/download.conf,Mainland

# > 国内直连规则
RULE-SET,https://ruleset.skk.moe/List/non_ip/domestic.conf,Mainland
RULE-SET,https://ruleset.skk.moe/List/non_ip/direct.conf,Mainland
RULE-SET,https://ruleset.skk.moe/List/ip/domestic.conf,Mainland

# > 全球代理规则
RULE-SET,https://ruleset.skk.moe/List/non_ip/global_plus.conf,Automatic
RULE-SET,https://ruleset.skk.moe/List/non_ip/global.conf,Automatic
RULE-SET,https://raw.githubusercontent.com/zxfccmm4/Profiles/main/Surge/Ruleset/Global.list,Automatic

# ========== 12. 兜底规则 ==========
# > 有意设计：所有未匹配流量（含 DNS 解析失败的连接）交给 AI 组的自建节点承接
FINAL,AI,dns-failed

[Host]
# > 定义本地DNS记录
# 该功能等同于 /etc/hosts，加上了泛解析和别名支持。
# > 国内域名统一使用阿里 HTTPS DoH；Surge iOS 5.14.3+
# > 精简版清单（约 3700 条，ChinaMax 的 1/30）；未覆盖的国内域名如遇 CDN 调度不佳，追加到 rulesets/cdn-cn.list 即可
DOMAIN-SET:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/China/China_Domain.list = server:https://223.5.5.5/dns-query

# ========== 跨国厂商国内 CDN 调度 ==========
# > 仅影响直连流量的本地解析；策略组切到代理时为远端解析，自动不受影响
DOMAIN-SET:https://ruleset.skk.moe/List/domainset/apple_cdn.conf = server:https://223.5.5.5/dns-query
DOMAIN-SET:https://ruleset.skk.moe/List/domainset/game-download.conf = server:https://223.5.5.5/dns-query
DOMAIN-SET:https://ruleset.skk.moe/List/domainset/download.conf = server:https://223.5.5.5/dns-query
# > 自维护补缺集（Apple 主站/微软下载域名，见仓库 rulesets/cdn-cn.list）
DOMAIN-SET:https://raw.githubusercontent.com/lihuaye/surge/main/rulesets/cdn-cn.list = server:https://223.5.5.5/dns-query
# ========== 静态映射 ==========
# > Firebase Cloud Messaging（保留原有静态 IP，不会发起 DNS 查询）
mtalk.google.com = 108.177.125.188

